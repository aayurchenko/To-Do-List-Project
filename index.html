<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="style.css">
  <title>Todo List</title>
</head>
<body>
  <header>
    <h2 class="title">Todo List JavaScript</h2>
    <a href="#" class="btn_change_theme" id="button_change_theme">Сменить тему</a>
  </header>
  <main>
    <div class="container">
      <ul class="todo__list">
      </ul>

      <form class="addtodo__item">
        <input type="text" class="todo-item__addText" placeholder="Напиши задачу">
        <button class="todo-item__add" type="submit" >Добавить задачу</button>
      </form>
    </div> 


  </main>





  <script src="script.js" ></script>

</body>
</html>
